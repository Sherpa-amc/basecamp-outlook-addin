<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8"/>
    <title>Hello Sherpa Test</title>
    <script src="https://appsforoffice.microsoft.com/lib/1.1/hosted/office.js"></script>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Arial, sans-serif;
            margin: 0;
            padding: 24px;
            background: #f7f8fa;
            color: #1a2332;
        }
        h1 { font-size: 18px; margin-top: 0; }
        .ok {
            background: #dcfce7;
            color: #166534;
            padding: 12px;
            border-radius: 6px;
            margin: 12px 0;
            font-size: 13px;
        }
        .info {
            background: #fff;
            border: 1px solid #e5e7eb;
            border-radius: 6px;
            padding: 12px;
            font-size: 12px;
            color: #4b5563;
        }
    </style>
</head>
<body>
    <h1>Hello from Sherpa Test</h1>
    <div class="ok">
        &#x2713; If you can read this, the add-in installed correctly.
    </div>
    <div class="info">
        <p><strong>Subject:</strong> <span id="subject">…</span></p>
        <p><strong>From:</strong> <span id="from">…</span></p>
        <p><strong>Office.js:</strong> <span id="ofver">…</span></p>
    </div>
    <script>
        Office.onReady((info) => {
            document.getElementById('ofver').textContent =
                `${info.host} ${info.platform}`;
            const item = Office.context.mailbox.item;
            if (item) {
                document.getElementById('subject').textContent =
                    item.subject || '(no subject)';
                document.getElementById('from').textContent =
                    (item.from && item.from.emailAddress) || '(unknown)';
            }
        });
    </script>
</body>
</html>
